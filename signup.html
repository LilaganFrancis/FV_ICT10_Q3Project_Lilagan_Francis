<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<head>
    <title>Sign Up</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0b1f14;
            color: white;
            text-align: center;
        }

        header {
            background-color: black;
            padding: 15px;
        }

        header h1 {
            margin: 0;
            color: #00cc66;
        }

        nav {
            margin-top: 8px;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: #00cc66;
        }

        .container {
            background-color: #123524;
            width: 320px;
            margin: 60px auto;
            padding: 20px;
            border-radius: 8px;
        }

        input {
            width: 95%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background-color: #00cc66;
            color: black;
            padding: 8px;
            width: 100%;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #00994d;
        }

        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>Intramurals 2025-2026</h1>
    <nav>
        <a href="signup.html">Sign Up</a>
        <a href="teamchecker.html">Team Checker</a>
        <a href="players.html">Players</a>
    </nav>
</header>

<div class="container">
    <h3>Create Account</h3>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="signup()">Sign Up</button>

    <p id="result"></p>
</div>

<script>
function signup() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let result = document.getElementById("result");

    if (user.length < 7) {
        result.innerText = "Username must have at least 7 characters.";
        return;
    }

    if (pass.length < 10) {
        result.innerText = "Password must have at least 10 characters.";
        return;
    }

    if (!/[A-Za-z]/.test(pass)) {
        result.innerText = "Password must have at least one letter.";
        return;
    }

    if (!/[0-9]/.test(pass)) {
        result.innerText = "Password must have at least one number.";
        return;
    }

    result.innerText = "Account has been created!";
}
</script>

</body>
</html>
